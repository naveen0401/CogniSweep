services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    env_file:
      - ./deploy/.env.production
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - errorsweep-app
      - errorsweep-billing-webhook

  errorsweep-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: errorsweep/app:latest
    restart: unless-stopped
    env_file:
      - ./deploy/.env.production
    environment:
      ERRORSWEEP_ENV: production
      COGNISWEEP_PUBLIC_BASE_URL: ${COGNISWEEP_PUBLIC_BASE_URL:-https://cognisweep.com}
      ERRORSWEEP_PUBLIC_BASE_URL: ${ERRORSWEEP_PUBLIC_BASE_URL:-https://cognisweep.com}
      COGNISWEEP_BILLING_WEBHOOK_RECEIVER_URL: ${COGNISWEEP_BILLING_WEBHOOK_RECEIVER_URL:-https://cognisweep.com/webhooks/billing/razorpay}
      ERRORSWEEP_BILLING_WEBHOOK_RECEIVER_URL: ${ERRORSWEEP_BILLING_WEBHOOK_RECEIVER_URL:-https://cognisweep.com/webhooks/billing/razorpay}
      ERRORSWEEP_EDITOR_JOB_DIR: /data/errorsweep/editor_jobs
      ERRORSWEEP_JOB_ATTACHMENT_DIR: /data/errorsweep/job_attachments
      ERRORSWEEP_OBJECT_STORAGE_DIR: /data/errorsweep/object_storage
      ERRORSWEEP_ASYNC_WORKER_URL: http://errorsweep-async-receiver:8300/tasks
      SELF_HOSTED_MT_ALLOW_PRIVATE_ENDPOINTS: "true"
      SELF_HOSTED_MT_ACTIVE_ENGINES: ${SELF_HOSTED_MT_ACTIVE_ENGINES:-indictrans2,opus}
      INDICTRANS2_ENDPOINT: http://errorsweep-indictrans2:8000/translate
      OPUS_MT_ENDPOINT: http://errorsweep-opus-mt:8100/translate
    volumes:
      - errorsweep-data:/data/errorsweep
      - errorsweep-logs:/logs/errorsweep
    depends_on:
      errorsweep-async-receiver:
        condition: service_healthy
      errorsweep-opus-mt:
        condition: service_healthy
      errorsweep-indictrans2:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  errorsweep-async-receiver:
    image: errorsweep/app:latest
    restart: unless-stopped
    env_file:
      - ./deploy/.env.production
    environment:
      ERRORSWEEP_ASYNC_WORKER_SERVICE_ENABLED: "true"
      ERRORSWEEP_ASYNC_WORKER_HOST: 0.0.0.0
      ERRORSWEEP_ASYNC_WORKER_PORT: 8300
      ERRORSWEEP_ASYNC_WORKER_DIR: /data/errorsweep/async_worker
      ERRORSWEEP_EDITOR_JOB_DIR: /data/errorsweep/editor_jobs
      ERRORSWEEP_OBJECT_STORAGE_DIR: /data/errorsweep/object_storage
    command: ["python", "async_task_worker.py", "--host", "0.0.0.0", "--port", "8300"]
    volumes:
      - errorsweep-data:/data/errorsweep
      - errorsweep-logs:/logs/errorsweep
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8300/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  errorsweep-worker-supervisor:
    image: errorsweep/app:latest
    restart: unless-stopped
    env_file:
      - ./deploy/.env.production
    environment:
      ERRORSWEEP_WORKER_SUPERVISOR_ENABLED: "true"
      ERRORSWEEP_SUPERVISOR_ENABLE_ASYNC_PROCESSOR: "true"
      ERRORSWEEP_SUPERVISOR_ENABLE_EMAIL_WORKER: "true"
      ERRORSWEEP_EMAIL_DISPATCH_WORKER_ENABLED: "true"
      ERRORSWEEP_SUPERVISOR_ENABLE_BACKUP_WORKER: "true"
      ERRORSWEEP_SUPERVISOR_ENABLE_BILLING_RECEIVER: "false"
      ERRORSWEEP_SUPERVISOR_LOG_DIR: /logs/errorsweep/supervisor
      ERRORSWEEP_SUPERVISOR_STATUS_FILE: /logs/errorsweep/supervisor/status.json
      ERRORSWEEP_ASYNC_WORKER_DIR: /data/errorsweep/async_worker
      ERRORSWEEP_ASYNC_RESULT_DIR: /data/errorsweep/async_results
      ERRORSWEEP_EDITOR_JOB_DIR: /data/errorsweep/editor_jobs
      ERRORSWEEP_OBJECT_STORAGE_DIR: /data/errorsweep/object_storage
      ERRORSWEEP_BACKUP_OUTPUT_DIR: /data/errorsweep/backups
    command: ["python", "worker_supervisor.py"]
    volumes:
      - errorsweep-data:/data/errorsweep
      - errorsweep-logs:/logs/errorsweep
    depends_on:
      errorsweep-async-receiver:
        condition: service_healthy

  errorsweep-billing-webhook:
    image: errorsweep/app:latest
    restart: unless-stopped
    env_file:
      - ./deploy/.env.production
    environment:
      ERRORSWEEP_BILLING_WEBHOOK_HOST: 0.0.0.0
      ERRORSWEEP_BILLING_WEBHOOK_PORT: 8301
      ERRORSWEEP_EDITOR_JOB_DIR: /data/errorsweep/editor_jobs
    command: ["python", "billing_webhook_receiver.py"]
    volumes:
      - errorsweep-data:/data/errorsweep
      - errorsweep-logs:/logs/errorsweep
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8301/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  errorsweep-opus-mt:
    build:
      context: .
      dockerfile: Dockerfile.opus-mt
    image: errorsweep/opus-mt:latest
    restart: unless-stopped
    env_file:
      - ./deploy/.env.production
    environment:
      OPUS_MT_API_KEY: ${OPUS_MT_API_KEY:?Set OPUS_MT_API_KEY}
      OPUS_MT_FORCE_CPU: ${OPUS_MT_FORCE_CPU:-true}
      OPUS_MT_BATCH_SIZE: ${OPUS_MT_BATCH_SIZE:-2}
      OPUS_MT_MAX_INPUT_LENGTH: ${OPUS_MT_MAX_INPUT_LENGTH:-192}
      OPUS_MT_MAX_NEW_TOKENS: ${OPUS_MT_MAX_NEW_TOKENS:-192}
      OPUS_MT_MAX_SEGMENTS: ${OPUS_MT_MAX_SEGMENTS:-48}
      OPUS_MT_MAX_TOTAL_CHARS: ${OPUS_MT_MAX_TOTAL_CHARS:-25000}
      OPUS_MT_MODEL_CACHE_SIZE: ${OPUS_MT_MODEL_CACHE_SIZE:-1}
      HF_HOME: /models/huggingface
      TRANSFORMERS_CACHE: /models/huggingface
    volumes:
      - opus-mt-models:/models/huggingface
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8100/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  errorsweep-indictrans2:
    build:
      context: .
      dockerfile: Dockerfile.indictrans2
    image: errorsweep/indictrans2:latest
    restart: unless-stopped
    env_file:
      - ./deploy/.env.production
    environment:
      INDICTRANS2_API_KEY: ${INDICTRANS2_API_KEY:?Set INDICTRANS2_API_KEY}
      INDICTRANS2_FORCE_CPU: ${INDICTRANS2_FORCE_CPU:-true}
      INDICTRANS2_PRELOAD: ${INDICTRANS2_PRELOAD:-false}
      INDICTRANS2_BATCH_SIZE: ${INDICTRANS2_BATCH_SIZE:-2}
      INDICTRANS2_MAX_INPUT_LENGTH: ${INDICTRANS2_MAX_INPUT_LENGTH:-192}
      INDICTRANS2_MAX_NEW_TOKENS: ${INDICTRANS2_MAX_NEW_TOKENS:-192}
      INDICTRANS2_MAX_SEGMENTS: ${INDICTRANS2_MAX_SEGMENTS:-48}
      INDICTRANS2_MAX_TOTAL_CHARS: ${INDICTRANS2_MAX_TOTAL_CHARS:-25000}
      HF_HOME: /models/huggingface
      TRANSFORMERS_CACHE: /models/huggingface
    volumes:
      - indictrans2-models:/models/huggingface
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

volumes:
  errorsweep-data:
  errorsweep-logs:
  opus-mt-models:
  indictrans2-models:
  caddy-data:
  caddy-config:
