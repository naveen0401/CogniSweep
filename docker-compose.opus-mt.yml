services:
  errorsweep-opus-mt:
    build:
      context: .
      dockerfile: Dockerfile.opus-mt
    container_name: errorsweep-opus-mt
    restart: unless-stopped
    ports:
      - "8100:8100"
    environment:
      OPUS_MT_API_KEY: "${OPUS_MT_API_KEY:?Set OPUS_MT_API_KEY before starting OPUS-MT}"
      OPUS_MT_FORCE_CPU: "${OPUS_MT_FORCE_CPU:-true}"
      OPUS_MT_BATCH_SIZE: "${OPUS_MT_BATCH_SIZE:-8}"
      OPUS_MT_MAX_INPUT_LENGTH: "${OPUS_MT_MAX_INPUT_LENGTH:-256}"
      OPUS_MT_MAX_NEW_TOKENS: "${OPUS_MT_MAX_NEW_TOKENS:-256}"
      OPUS_MT_MAX_SEGMENTS: "${OPUS_MT_MAX_SEGMENTS:-96}"
      OPUS_MT_MAX_TOTAL_CHARS: "${OPUS_MT_MAX_TOTAL_CHARS:-60000}"
      HF_HOME: "/models/huggingface"
      TRANSFORMERS_CACHE: "/models/huggingface"
    volumes:
      - opus-mt-models:/models/huggingface

volumes:
  opus-mt-models:

