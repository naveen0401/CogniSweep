services:
  errorsweep-indictrans2:
    build:
      context: .
      dockerfile: Dockerfile.indictrans2
    container_name: errorsweep-indictrans2
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      INDICTRANS2_API_KEY: "${INDICTRANS2_API_KEY:?Set INDICTRANS2_API_KEY before starting IndicTrans2}"
      INDICTRANS2_FORCE_CPU: "${INDICTRANS2_FORCE_CPU:-true}"
      INDICTRANS2_PRELOAD: "${INDICTRANS2_PRELOAD:-false}"
      INDICTRANS2_BATCH_SIZE: "${INDICTRANS2_BATCH_SIZE:-4}"
      INDICTRANS2_MAX_INPUT_LENGTH: "${INDICTRANS2_MAX_INPUT_LENGTH:-256}"
      INDICTRANS2_MAX_NEW_TOKENS: "${INDICTRANS2_MAX_NEW_TOKENS:-256}"
      INDICTRANS2_MAX_SEGMENTS: "${INDICTRANS2_MAX_SEGMENTS:-96}"
      INDICTRANS2_MAX_TOTAL_CHARS: "${INDICTRANS2_MAX_TOTAL_CHARS:-60000}"
      HF_HOME: "/models/huggingface"
      TRANSFORMERS_CACHE: "/models/huggingface"
    volumes:
      - indictrans2-models:/models/huggingface

volumes:
  indictrans2-models:
