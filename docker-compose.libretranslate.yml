cat > docker-compose.libretranslate.yml <<'YAML'
services:
  libretranslate:
    image: libretranslate/libretranslate:latest
    container_name: errorsweep-libretranslate
    ports:
      - "5000:5000"
    restart: unless-stopped
    environment:
      LT_UPDATE_MODELS: "true"
      LT_LOAD_ONLY: "en,es,fr,de,it,pt,ru,ar,zh,ja,ko,hi"
      ARGOS_CHUNK_TYPE: "MINISBD"
    volumes:
      - libretranslate-models:/home/libretranslate/.local:rw
    healthcheck:
      test: ["CMD-SHELL", "./venv/bin/python scripts/healthcheck.py"]
      interval: 10s
      timeout: 4s
      retries: 6
      start_period: 20s

volumes:
  libretranslate-models:
YAML